name: optom
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1
environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  logger: ^2.7.0
  rxdart: ^0.28.0
  intl: ^0.20.2
  dio: ^5.9.0
  go_router: ^17.0.0
  get_it: ^9.0.5
  flutter_bloc: ^7.0.0
  shared_preferences: ^2.5.3
